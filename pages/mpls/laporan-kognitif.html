<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Laporan Asesmen Kognitif</title>
<style>
  :root {
    --ink: #1a1a2e; --ink-2: #3d3d5c; --ink-3: #7b7b9a;
    --paper: #faf9f6; --border: #d9d6cd;
    --accent: #2e6fbc; --accent-2: #e8a020; --accent-3: #2a9d6f; --danger: #c94040;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #eee; color: var(--ink); }

  #toolbar {
    position: sticky; top: 0; z-index: 10;
    background: var(--ink); color: #fff; padding: 10px 16px;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  #toolbar a { color: rgba(255,255,255,0.8); text-decoration: none; font-size: 13px; }
  #toolbar button {
    background: var(--accent-2); color: var(--ink); border: none; font-weight: 700;
    padding: 8px 16px; border-radius: 7px; font-size: 13px; cursor: pointer;
  }

  #page {
    width: 210mm; min-height: 297mm; margin: 16px auto; background: #fff;
    padding: 11mm; box-shadow: 0 4px 18px rgba(0,0,0,0.15);
    font-size: 11.5px; line-height: 1.38;
  }

  #status { max-width: 210mm; margin: 16px auto; text-align: center; color: var(--ink-3); font-size: 13px; }

  .rep-header { display: flex; align-items: center; gap: 12px; border-bottom: 3px solid var(--accent-2); padding-bottom: 8px; margin-bottom: 12px; }
  .rep-header img { width: 44px; height: 44px; object-fit: contain; }
  .rep-header h1 { font-size: 16.5px; }
  .rep-header p { font-size: 11px; color: var(--ink-3); }

  .rep-identitas-wrap { display: flex; gap: 10px; margin-bottom: 12px; }
  .rep-photo-box {
    width: 22mm; height: 28mm; flex-shrink: 0; border: 1px solid var(--border); border-radius: 5px;
    background: var(--paper); overflow: hidden; display: flex; align-items: center; justify-content: center;
  }
  .rep-photo-box img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .rep-photo-box .ph-empty { font-size: 9px; color: var(--ink-3); text-align: center; padding: 4px; }

  .rep-identitas {
    flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 4px 18px;
    background: var(--paper); border: 1px solid var(--border); border-radius: 6px;
    padding: 9px 11px; font-size: 11.5px; align-content: center;
  }
  .rep-identitas b { color: var(--ink-2); }

  .rep-overall {
    border: 1.5px solid var(--accent); border-radius: 6px; padding: 9px 11px; margin-bottom: 13px;
  }
  .rep-overall h2 { font-size: 13px; margin-bottom: 4px; }
  .rep-overall .badge { font-weight: 700; }
  .rep-overall p { font-size: 11px; margin-top: 3px; }
  .rep-overall .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 7px; }
  .rep-overall .cols div { font-size: 10.5px; }
  .rep-overall .cols b { display: block; margin-bottom: 3px; font-size: 11px; }
  .rep-overall .cols ul { padding-left: 14px; }

  .rep-section-title {
    font-size: 11px; font-weight: 700; color: var(--ink-2);
    margin: 10px 0 5px; padding-left: 7px; border-left: 3px solid var(--accent);
    text-transform: uppercase; letter-spacing: 0.3px;
  }
  .rep-section-title.first { margin-top: 0; }

  .rep-cats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .rep-cats.cols-4 { grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; }
  .rep-cats + .rep-section-title { margin-top: 8px; }
  .rep-cat { border: 1px solid var(--border); border-radius: 6px; padding: 7px 9px; border-top: 3px solid var(--cat-accent, var(--accent)); }
  .rep-cat h3 { font-size: 11px; margin-bottom: 3px; }
  .rep-cat .lvl { font-size: 10px; font-weight: 700; }
  .rep-cat p { font-size: 10px; color: var(--ink-2); margin-top: 4px; }
  .rep-cat .rec { font-size: 9.5px; margin-top: 4px; }
  .rep-cat .rec b { display: inline; }

  .rep-cats.cols-4 .rep-cat { padding: 6px 7px; }
  .rep-cats.cols-4 .rep-cat h3 { font-size: 10px; }
  .rep-cats.cols-4 .rep-cat p { font-size: 9.3px; }
  .rep-cats.cols-4 .rep-cat .rec { font-size: 9px; }

  .lvl-BB { color: var(--danger); }
  .lvl-MB { color: #b5790f; }
  .lvl-BSH { color: var(--accent); }
  .lvl-BSB { color: var(--accent-3); }

  .rep-footer { margin-top: 12px; font-size: 9px; color: var(--ink-3); }

  /* ── BLOK TANDA TANGAN (skala px, bukan pt, samakan dgn teks isi) ──── */
  .rep-signature { display: flex; justify-content: flex-end; margin-top: 16px; }
  .sig-col { width: 170px; text-align: center; font-size: 11px; }
  .sig-date { margin-bottom: 2px; }
  .sig-space { height: 43px; }
  .sig-name { font-weight: 700; font-size: 12px; border-top: 1px solid var(--ink); padding-top: 4px; }
  .sig-nbm { font-size: 10.5px; color: var(--ink-2); margin-top: 2px; }

  @media print {
    body { background: #fff; }
    #toolbar { display: none !important; }
    #page { box-shadow: none; margin: 0; width: auto; min-height: auto; padding: 0; }
    @page { size: A4; margin: 11mm; }
  }
</style>
</head>
<body>

<div id="checking" style="position:fixed;inset:0;background:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;color:#7b7b9a;z-index:500">
  Memeriksa akses…
</div>

<div id="toolbar" class="hidden-when-checking" style="display:none">
  <a href="rekap-kognitif.html">← Kembali ke Rekap</a>
  <button onclick="window.print()">🖨️ Cetak / Simpan sebagai PDF</button>
</div>

<div id="status">Memuat data…</div>
<div id="page" style="display:none"></div>

<script type="module" src="../../assets/js/guru-guard.js"></script>
<script src="../../assets/js/foto-fallback.js"></script>
<script src="assets/mpls-data.js"></script>
<script src="assets/mpls-kognitif-data.js"></script>
<script src="assets/config.js"></script>
<script src="assets/mpls-scoring-kognitif.js"></script>
<script>
  function qs(name) {
    return new URLSearchParams(window.location.search).get(name);
  }

  function levelClass(level) { return level ? "lvl-" + level : ""; }

  async function loadSiswaProfile(nama) {
    try {
      const res = await fetch(MPLS_CONFIG.APPS_SCRIPT_URL + "?siswa=1");
      const json = await res.json();
      const list = json.data || [];
      return list.find((s) => String(s["Nama Lengkap"]).trim().toLowerCase() === nama.trim().toLowerCase()) || null;
    } catch (e) {
      return null;
    }
  }

  async function render() {
    const nama = qs("nama");
    if (!nama) {
      document.getElementById("status").textContent = "Nama siswa tidak ditemukan di URL.";
      return;
    }

    let dataRow;
    try {
      const res = await fetch(MPLS_CONFIG.APPS_SCRIPT_URL + "?namaKognitif=" + encodeURIComponent(nama));
      const json = await res.json();
      if (!json.found) {
        document.getElementById("status").textContent = "Belum ada data asesmen kognitif untuk " + nama + ".";
        return;
      }
      dataRow = json.data;
    } catch (err) {
      document.getElementById("status").textContent = "Gagal memuat data: " + err.message;
      return;
    }

    const profil = await loadSiswaProfile(nama);
    const result = MplsScoringKognitif.computeStudentResult(dataRow);

    const identitasRight = profil ? `
      <div><b>Nama Panggilan:</b> ${profil["Nama Panggilan"] || "-"}</div>
      <div><b>TTL:</b> ${profil["Tempat Lahir"] || "-"}, ${profil["Tanggal Lahir"] || "-"}</div>
    ` : `<div></div><div></div>`;

    /**
     * v0.6.1 — Kelompokkan kartu kategori jadi 2 bagian terpisah (Literasi & Numerasi)
     * alih-alih 1 grid campur seperti sebelumnya, supaya lebih mudah dibaca/dijelaskan.
     * "Literasi" di sini mencakup literasi (membaca), menyimak, dan menulis — ketiganya
     * sama-sama kemampuan berbahasa/literasi dasar, berbeda dari numerasi (berhitung).
     * Daftar key ditulis eksplisit (bukan otomatis dari urutan array) supaya kalau nanti
     * ada kategori baru yang ditambahkan, tidak otomatis salah masuk kelompok — kategori
     * yang key-nya tidak dikenali akan muncul di kelompok "Lainnya" di akhir, bukan hilang.
     */
    const LITERASI_KEYS = ["literasi", "menyimak", "menulis"];
    const NUMERASI_KEYS = ["penjumlahan", "pengurangan", "perkalian", "pembagian"];

    function catCardHtml(c) {
      return `
        <div class="rep-cat" style="--cat-accent:${c.accent}">
          <h3>${c.icon} ${c.title}</h3>
          <div class="lvl ${levelClass(c.level)}">${c.levelLabel}${c.avg !== null ? " (rata-rata " + c.avg.toFixed(1) + "/4)" : ""}</div>
          <p>${c.simpulan}</p>
          ${c.guru[0] ? `<div class="rec"><b>Guru:</b> ${c.guru[0]}</div>` : ""}
          ${c.ortu[0] ? `<div class="rec"><b>Ortu:</b> ${c.ortu[0]}</div>` : ""}
        </div>`;
    }

    function catsSectionHtml(title, icon, cats, gridClass, isFirst) {
      if (!cats.length) return "";
      return `
        <div class="rep-section-title${isFirst ? " first" : ""}">${icon} ${title}</div>
        <div class="rep-cats${gridClass ? " " + gridClass : ""}">${cats.map(catCardHtml).join("")}</div>`;
    }

    const catLiterasi = result.categories.filter((c) => LITERASI_KEYS.includes(c.key));
    const catNumerasi = result.categories.filter((c) => NUMERASI_KEYS.includes(c.key));
    const catLainnya = result.categories.filter((c) => !LITERASI_KEYS.includes(c.key) && !NUMERASI_KEYS.includes(c.key));

    const catsHtml =
      catsSectionHtml("Literasi (Membaca, Menyimak & Menulis)", "📖", catLiterasi, "", true) +
      catsSectionHtml("Numerasi (Berhitung)", "🔢", catNumerasi, "cols-4", !catLiterasi.length) +
      catsSectionHtml("Lainnya", "📌", catLainnya, "", !catLiterasi.length && !catNumerasi.length);

    document.getElementById("page").innerHTML = `
      <div class="rep-header">
        <img src="../../assets/img/logo-sekolah.jpg" alt="Logo Sekolah" />
        <div>
          <h1>Laporan Hasil Asesmen Awal Kognitif</h1>
          <p>Literasi & Numerasi Dasar · Kelas 5 · Tahun Pelajaran 2026–2027</p>
        </div>
      </div>

      <div class="rep-identitas-wrap">
        <div class="rep-photo-box">
          ${profil && profil["URL Foto"]
            ? fotoImgHtml(profil["URL Foto"], "Foto siswa", "", '<div class="ph-empty">Foto<br/>Siswa</div>')
            : `<div class="ph-empty">Foto<br/>Siswa</div>`}
        </div>
        <div class="rep-identitas">
          <div><b>Nama Siswa:</b> ${dataRow["Nama Siswa"] || nama}</div>
          <div><b>Guru Kelas:</b> ${MPLS_WALI_KELAS}</div>
          ${identitasRight}
          <div><b>Guru Pengamat (pengisi form):</b> ${dataRow["Diisi Oleh"] || "-"}</div>
          <div><b>Tanggal Cetak:</b> ${new Date().toLocaleDateString("id-ID", { day: "numeric", month: "long", year: "numeric" })}</div>
        </div>
      </div>

      <div class="rep-overall">
        <h2>🎯 Kesimpulan Akhir Kesiapan Akademik: <span class="badge ${levelClass(result.overall.level)}">${result.overall.label}</span></h2>
        <p>${result.overall.narasi}</p>
        ${result.overall.kekuatan.length ? `<p style="margin-top:3px"><b>Aspek kuat:</b> ${result.overall.kekuatan.join(", ")}</p>` : ""}
        ${result.overall.perhatian.length ? `<p><b>Perlu perhatian:</b> ${result.overall.perhatian.join(", ")}</p>` : ""}
        <div class="cols">
          <div>
            <b>Langkah Guru di Sekolah</b>
            <ul>${(result.overall.guru.length ? result.overall.guru : ["Pertahankan pendampingan rutin yang sudah berjalan baik."]).map((g) => `<li>${g}</li>`).join("")}</ul>
          </div>
          <div>
            <b>Langkah Orang Tua di Rumah</b>
            <ul>${(result.overall.ortu.length ? result.overall.ortu : ["Pertahankan dukungan rutin yang sudah berjalan baik di rumah."]).map((o) => `<li>${o}</li>`).join("")}</ul>
          </div>
        </div>
      </div>

      ${catsHtml}

      <div class="rep-signature">
        <div class="sig-col">
          <div class="sig-date">${MPLS_KOTA_TTD}, ${new Date().toLocaleDateString("id-ID", { day: "numeric", month: "long", year: "numeric" })}</div>
          <div class="sig-space"></div>
          <div class="sig-name">${MPLS_WALI_KELAS_TTD}</div>
          <div class="sig-nbm">${MPLS_WALI_KELAS_NBM}</div>
        </div>
      </div>

      <div class="rep-footer">Dokumen ini dihasilkan otomatis oleh sistem Asesmen Kognitif Kelas 5. Bukan diagnosis klinis/psikologis.</div>
    `;

    document.getElementById("status").style.display = "none";
    document.getElementById("page").style.display = "block";
    document.getElementById("toolbar").style.display = "flex";
  }

  document.addEventListener("guru-verified", () => {
    document.getElementById("checking").remove();
    render();
  });
  document.addEventListener("DOMContentLoaded", () => window.guardGuruPage("../../index.html"));
</script>
</body>
</html>
